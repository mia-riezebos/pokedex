<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokedex — Issue Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f0c840;
      --gold-soft: #d4a828;
      --gold-glow: rgba(240,200,64,0.12);
      --gold-glow-strong: rgba(240,200,64,0.25);
      --bg: #070a10;
      --glass: rgba(255,255,255,0.035);
      --glass-border: rgba(255,255,255,0.06);
      --glass-hover: rgba(255,255,255,0.06);
      --glass-strong: rgba(255,255,255,0.055);
      --text: #e4e8f0;
      --text-dim: #7a82a0;
      --text-muted: #3c4260;
      --critical: #f43f5e;
      --high: #f97316;
      --medium: #eab308;
      --low: #10b981;
      --blue: #6366f1;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* === AMBIENT BACKGROUND === */
    .ambient {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(240,200,64,0.15), transparent 70%); top: -200px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(99,102,241,0.1), transparent 70%); bottom: -150px; right: -100px; animation-delay: -7s; }
    .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(244,63,94,0.06), transparent 70%); top: 40%; left: 50%; animation-delay: -14s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* === GLASS MIXIN === */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
    }

    /* === LAYOUT === */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* === HEADER === */
    .header {
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 14px; }

    .logo-mark {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gold) 0%, #c88d10 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fira Code', monospace;
      font-weight: 700; font-size: 18px; color: var(--bg);
      box-shadow: 0 4px 24px rgba(240,200,64,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .logo-text { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-text .accent { color: var(--gold); }
    .logo-text .dim { color: var(--text-dim); font-weight: 300; margin-left: 6px; font-size: 16px; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--low);
      letter-spacing: 1.5px; text-transform: uppercase; font-weight: 500;
    }

    .live-badge::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--low);
      box-shadow: 0 0 8px var(--low);
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .btn {
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 500;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(20px);
    }

    .btn:hover { border-color: var(--gold-soft); color: var(--gold); box-shadow: 0 0 20px var(--gold-glow); }

    /* === STATS === */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
      margin: 8px 0 24px;
    }

    .stat-card {
      padding: 20px;
      text-align: center;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    .stat-card.active {
      background: var(--glass-strong) !important;
      border-color: rgba(255,255,255,0.12);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .stat-card.active::before { background: var(--gold-soft) !important; }
    .stat-card.critical.active::before { background: var(--critical) !important; }
    .stat-card.high.active::before { background: var(--high) !important; }
    .stat-card.medium.active::before { background: var(--medium) !important; }
    .stat-card.low.active::before { background: var(--low) !important; }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: transparent;
      transition: background 0.3s;
    }

    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .stat-card:hover::before { background: var(--gold-soft); }
    .stat-card.critical:hover::before { background: var(--critical); }
    .stat-card.high:hover::before { background: var(--high); }
    .stat-card.medium:hover::before { background: var(--medium); }
    .stat-card.low:hover::before { background: var(--low); }

    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 500; }
    .stat-value { font-size: 36px; font-weight: 700; color: var(--text); margin-top: 6px; line-height: 1; letter-spacing: -1px; }

    .stat-card.critical .stat-value { color: var(--critical); }
    .stat-card.high .stat-value { color: var(--high); }
    .stat-card.medium .stat-value { color: var(--medium); }
    .stat-card.low .stat-value { color: var(--low); }

    /* === FILTERS === */
    .filters {
      display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;
    }

    .filter-select, .filter-input {
      font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 400;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text);
      outline: none;
      transition: all 0.25s;
      backdrop-filter: blur(20px);
    }

    .filter-select:focus, .filter-input:focus { border-color: rgba(240,200,64,0.3); box-shadow: 0 0 0 3px var(--gold-glow); }
    .filter-select option { background: #12151e; }
    .filter-input { flex: 1; min-width: 200px; }
    .filter-input::placeholder { color: var(--text-muted); }

    .filter-count { font-size: 12px; color: var(--text-muted); margin-left: auto; font-weight: 400; }

    /* === ISSUES === */
    .issues-wrap { margin-bottom: 40px; }

    .issues-header {
      display: grid;
      grid-template-columns: 100px 90px 1fr 120px 110px 70px;
      padding: 0 20px 12px;
      gap: 12px;
    }

    .issues-header span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 500; }

    .issue-card {
      display: grid;
      grid-template-columns: 100px 90px 1fr 120px 110px 70px;
      align-items: center;
      padding: 16px 20px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.2s;
      gap: 12px;
    }

    .issue-card:hover {
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.1);
      transform: translateX(4px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }

    /* Status */
    .status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-dim); text-transform: capitalize; font-weight: 400; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.open { background: var(--low); box-shadow: 0 0 8px rgba(16,185,129,0.4); }
    .status-dot.closed, .status-dot.fixed, .status-dot.wontfix { background: var(--text-muted); }
    .status-dot.acknowledged { background: var(--blue); box-shadow: 0 0 8px rgba(99,102,241,0.4); }
    .status-dot.escalated { background: var(--critical); box-shadow: 0 0 8px rgba(244,63,94,0.4); }

    /* Priority */
    .priority {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .priority.critical { background: rgba(244,63,94,0.1); color: var(--critical); border: 1px solid rgba(244,63,94,0.15); }
    .priority.high { background: rgba(249,115,22,0.1); color: var(--high); border: 1px solid rgba(249,115,22,0.15); }
    .priority.medium { background: rgba(234,179,8,0.1); color: var(--medium); border: 1px solid rgba(234,179,8,0.15); }
    .priority.low { background: rgba(16,185,129,0.1); color: var(--low); border: 1px solid rgba(16,185,129,0.15); }
    .priority.unclassified { background: rgba(60,66,96,0.2); color: var(--text-muted); border: 1px solid rgba(60,66,96,0.3); }

    .issue-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
    .issue-excerpt { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.3; font-weight: 300; }
    .category { font-size: 11px; color: var(--text-dim); background: rgba(255,255,255,0.04); padding: 3px 8px; border-radius: 5px; text-transform: capitalize; }
    .reporter { font-size: 12px; color: var(--gold-soft); font-weight: 400; }
    .date { font-size: 11px; color: var(--text-muted); font-weight: 300; }

    /* Empty / Loading */
    .state-msg { text-align: center; padding: 80px 20px; }
    .state-msg .icon { font-size: 40px; margin-bottom: 14px; opacity: 0.25; }
    .state-msg p { color: var(--text-muted); font-size: 14px; font-weight: 300; }
    .loading-dots::after { content: ''; display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--gold-soft); margin-left: 6px; animation: blink 1s infinite; }

    /* === DETAIL PANEL === */
    .detail-backdrop { display:none; position:fixed; inset:0; background:rgba(7,10,16,0.6); z-index:100; backdrop-filter:blur(4px); }
    .detail-backdrop.active { display:block; }

    .detail-panel {
      display:none; position:fixed; top:0; right:0; bottom:0; width:500px;
      z-index:101; overflow-y:auto;
      background: rgba(12,15,22,0.85);
      backdrop-filter: blur(60px) saturate(150%);
      -webkit-backdrop-filter: blur(60px) saturate(150%);
      border-left: 1px solid var(--glass-border);
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .detail-panel.active { display:block; transform:translateX(0); }

    .detail-head {
      padding: 24px; border-bottom: 1px solid var(--glass-border);
      display: flex; justify-content: space-between; align-items: flex-start;
      position: sticky; top: 0; z-index: 1;
      background: rgba(12,15,22,0.9);
      backdrop-filter: blur(40px);
    }

    .detail-head h3 { font-size: 17px; font-weight: 600; line-height: 1.4; flex: 1; padding-right: 12px; letter-spacing: -0.3px; }

    .close-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--glass-border);
      background: var(--glass); color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
      transition: all 0.2s; flex-shrink: 0;
    }

    .close-btn:hover { border-color: var(--critical); color: var(--critical); }

    .detail-content { padding: 24px; }
    .d-field { margin-bottom: 20px; }
    .d-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; font-weight: 500; }
    .d-value { color: var(--text-dim); font-size: 13px; line-height: 1.6; font-weight: 300; }
    .d-value.mono { font-family: 'Fira Code', monospace; font-size: 11px; background: rgba(0,0,0,0.3); padding: 14px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); line-height: 1.7; }
    .d-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

    /* === ADMIN PANEL === */
    .admin-overlay { display:none; position:fixed; inset:0; z-index:9999; backdrop-filter:blur(12px); background:rgba(7,10,16,0.88); overflow-y:auto; }
    .admin-overlay.active { display:flex; align-items:flex-start; justify-content:center; padding:60px 20px; }

    .admin-box {
      width:100%; max-width:640px; padding:28px;
      background: rgba(15,18,26,0.9);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(244,63,94,0.2);
      border-radius: var(--radius);
      box-shadow: 0 0 60px rgba(244,63,94,0.05);
    }

    .admin-box h2 {
      font-size: 16px; font-weight: 600; color: var(--critical);
      letter-spacing: 2px; text-transform: uppercase;
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
    }

    .admin-box h2 button { background:none; border:none; color:var(--text-muted); font-size:20px; cursor:pointer; transition:color 0.2s; }
    .admin-box h2 button:hover { color:var(--text); }

    .admin-input {
      width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:1px solid var(--glass-border);
      background:rgba(0,0,0,0.3); color:var(--text); font-family:'Outfit',sans-serif; font-size:13px;
      outline:none; margin-bottom:16px; transition:border-color 0.2s;
    }
    .admin-input:focus { border-color:rgba(244,63,94,0.4); }

    .admin-btns { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .admin-btn { font-family:'Outfit',sans-serif; font-size:11px; font-weight:500; padding:8px 14px; border-radius:6px; cursor:pointer; transition:all 0.2s; border:1px solid var(--glass-border); background:var(--glass); color:var(--text-dim); }
    .admin-btn:hover { border-color:var(--text-dim); }
    .admin-btn.danger { border-color:rgba(244,63,94,0.3); color:var(--critical); }
    .admin-btn.danger:hover { background:rgba(244,63,94,0.1); }
    .admin-btn.nuke { border-color:rgba(244,63,94,0.15); color:rgba(244,63,94,0.5); }
    .admin-btn.nuke:hover { color:var(--critical); background:rgba(244,63,94,0.1); }

    .admin-status { font-size:12px; margin-bottom:12px; display:none; padding:8px 12px; border-radius:6px; background:rgba(0,0,0,0.2); }
    .admin-list { max-height:360px; overflow-y:auto; border:1px solid var(--glass-border); border-radius:var(--radius-sm); }
    .admin-list label { display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--glass-border); cursor:pointer; transition:background 0.15s; font-size:12px; }
    .admin-list label:last-child { border-bottom:none; }
    .admin-list label:hover { background:var(--glass-hover); }
    .admin-list input[type="checkbox"] { accent-color:var(--critical); }

    /* Animations */
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .anim { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* Responsive */
    @media (max-width:900px) {
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
      .issues-header, .issue-card { grid-template-columns: 80px 75px 1fr 80px; }
      .issues-header > :nth-child(5), .issues-header > :nth-child(6),
      .issue-card > :nth-child(5), .issue-card > :nth-child(6) { display:none; }
      .detail-panel { width:100%; }
    }

    @media (max-width:600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .container { padding: 0 16px; }
      .logo-text .dim { display:none; }
    }
  </style>
</head>
<body>

  <div class="ambient">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">

    <div class="header anim">
      <div class="logo">
        <div class="logo-mark">P</div>
        <div class="logo-text"><span class="accent">Pokedex</span><span class="dim">Issue Tracker</span></div>
      </div>
      <div class="header-right">
        <div class="live-badge">Live</div>
        <button class="btn" id="refresh-btn">Refresh</button>
      </div>
    </div>

    <div class="stats-grid anim" style="animation-delay:0.08s">
      <div class="stat-card glass" data-filter="all"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">-</div></div>
      <div class="stat-card glass" data-filter="status:open"><div class="stat-label">Open</div><div class="stat-value" id="stat-open">-</div></div>
      <div class="stat-card glass" data-filter="status:closed"><div class="stat-label">Closed</div><div class="stat-value" id="stat-closed">-</div></div>
      <div class="stat-card glass critical" data-filter="priority:critical"><div class="stat-label">Critical</div><div class="stat-value" id="stat-critical">-</div></div>
      <div class="stat-card glass high" data-filter="priority:high"><div class="stat-label">High</div><div class="stat-value" id="stat-high">-</div></div>
      <div class="stat-card glass medium" data-filter="priority:medium"><div class="stat-label">Medium</div><div class="stat-value" id="stat-medium">-</div></div>
      <div class="stat-card glass low" data-filter="priority:low"><div class="stat-label">Low</div><div class="stat-value" id="stat-low">-</div></div>
    </div>

    <div class="filters anim" style="animation-delay:0.15s">
      <select class="filter-select" id="filter-status">
        <option value="">All Status</option>
        <option value="open" selected>Open</option>
        <option value="closed">Closed</option>
        <option value="fixed">Fixed</option>
        <option value="acknowledged">Acknowledged</option>
        <option value="escalated">Escalated</option>
      </select>
      <select class="filter-select" id="filter-priority">
        <option value="">All Priority</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select class="filter-select" id="filter-category">
        <option value="">All Categories</option>
        <option value="bug">Bug</option>
        <option value="feature_request">Feature Request</option>
        <option value="ux_issue">UX Issue</option>
        <option value="performance">Performance</option>
        <option value="security">Security</option>
        <option value="infrastructure">Infrastructure</option>
        <option value="other">Other</option>
      </select>
      <input class="filter-input" type="text" id="search" placeholder="Search issues...">
      <span class="filter-count" id="filter-count"></span>
    </div>

    <div class="issues-wrap">
      <div class="state-msg" id="loading"><p class="loading-dots">Loading</p></div>

      <div id="issues-container" style="display:none;">
        <div class="issues-header">
          <span>Status</span><span>Priority</span><span>Issue</span><span>Category</span><span>Reporter</span><span>Date</span>
        </div>
        <div id="issue-list"></div>
      </div>

      <div class="state-msg" id="empty" style="display:none;">
        <div class="icon">&#128270;</div>
        <p>No issues match your filters</p>
      </div>
    </div>
  </div>

  <!-- Detail -->
  <div class="detail-backdrop" id="detail-backdrop"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-head"><h3 id="detail-title"></h3><button class="close-btn" id="detail-close">&times;</button></div>
    <div class="detail-content" id="detail-body"></div>
  </div>

  <!-- Admin -->
  <div class="admin-overlay" id="admin-panel">
    <div class="admin-box">
      <h2>Admin <button id="close-admin">&times;</button></h2>
      <input type="password" class="admin-input" id="admin-key" placeholder="Secret key...">
      <div class="admin-btns">
        <button class="admin-btn danger" id="btn-delete-selected">Delete Selected</button>
        <button class="admin-btn" id="btn-select-all">Select All</button>
        <button class="admin-btn" id="btn-select-none">Select None</button>
        <button class="admin-btn nuke" id="btn-delete-all">DELETE ALL</button>
      </div>
      <div class="admin-status" id="admin-status"></div>
      <div class="admin-list" id="admin-issues"></div>
    </div>
  </div>

  <script>
    let allIssues = [];

    async function loadData() {
      try {
        const [iR, sR] = await Promise.all([fetch('/api/issues'), fetch('/api/stats')]);
        const iD = await iR.json(), sD = await sR.json();
        allIssues = iD.issues || [];
        document.getElementById('stat-total').textContent = sD.total || 0;
        document.getElementById('stat-open').textContent = sD.open || 0;
        document.getElementById('stat-closed').textContent = sD.closed || 0;
        document.getElementById('stat-critical').textContent = sD.byPriority?.critical || 0;
        document.getElementById('stat-high').textContent = sD.byPriority?.high || 0;
        document.getElementById('stat-medium').textContent = sD.byPriority?.medium || 0;
        document.getElementById('stat-low').textContent = sD.byPriority?.low || 0;
        filterIssues();
        document.getElementById('loading').style.display = 'none';
      } catch { document.getElementById('loading').innerHTML = '<p>Failed to connect</p>'; }
    }

    function filterIssues() {
      const s = document.getElementById('filter-status').value;
      const p = document.getElementById('filter-priority').value;
      const c = document.getElementById('filter-category').value;
      const q = document.getElementById('search').value.toLowerCase();
      let f = allIssues;
      if (s) f = f.filter(i => i.status === s);
      if (p) f = f.filter(i => i.priority === p);
      if (c) f = f.filter(i => i.category === c);
      if (q) f = f.filter(i => (i.summary||'').toLowerCase().includes(q)||(i.text||'').toLowerCase().includes(q)||(i.reporterName||'').toLowerCase().includes(q)||(i.id||'').toLowerCase().includes(q));
      document.getElementById('filter-count').textContent = `${f.length} issue${f.length!==1?'s':''}`;
      renderIssues(f);
    }

    ['filter-status','filter-priority','filter-category'].forEach(id => document.getElementById(id).addEventListener('change', filterIssues));
    document.getElementById('search').addEventListener('input', filterIssues);

    // Clickable stat cards
    document.querySelectorAll('.stat-card[data-filter]').forEach(card => {
      card.addEventListener('click', () => {
        const filter = card.dataset.filter;

        // Toggle: if already active, clear it
        const wasActive = card.classList.contains('active');
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));

        if (wasActive) {
          // Reset filters
          document.getElementById('filter-status').value = '';
          document.getElementById('filter-priority').value = '';
        } else {
          card.classList.add('active');

          if (filter === 'all') {
            document.getElementById('filter-status').value = '';
            document.getElementById('filter-priority').value = '';
          } else {
            const [type, value] = filter.split(':');
            if (type === 'status') {
              document.getElementById('filter-status').value = value;
              document.getElementById('filter-priority').value = '';
            } else if (type === 'priority') {
              document.getElementById('filter-priority').value = value;
              document.getElementById('filter-status').value = '';
            }
          }
        }

        filterIssues();
      });
    });

    function renderIssues(issues) {
      const wrap = document.getElementById('issues-container');
      const list = document.getElementById('issue-list');
      const empty = document.getElementById('empty');
      if (!issues.length) { wrap.style.display='none'; empty.style.display='block'; return; }
      wrap.style.display='block'; empty.style.display='none';

      list.innerHTML = issues.map((issue, i) => {
        const date = issue.createdAt ? new Date(issue.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '-';
        const st = issue.status||'open';
        const pr = issue.priority||'unclassified';
        return `<div class="issue-card glass anim" style="animation-delay:${Math.min(i*0.03,0.6)}s" data-id="${issue.id}">
          <div class="status"><span class="status-dot ${st}"></span>${st}</div>
          <div><span class="priority ${pr}">${pr}</span></div>
          <div><div class="issue-title">${issue.attachments?.length?'<span style="color:var(--gold-soft);margin-right:4px;" title="Has attachments">🖼️</span>':''}${esc(issue.summary||'No summary')}</div><div class="issue-excerpt">${esc((issue.text||'').slice(0,100))}${(issue.text||'').length>100?'...':''}</div></div>
          <div><span class="category">${(issue.category||'other').replace(/_/g,' ')}</span></div>
          <div class="reporter">${esc(issue.reporterName||'unknown')}</div>
          <div class="date">${date}</div>
        </div>`;
      }).join('');

      list.querySelectorAll('.issue-card').forEach(r => r.addEventListener('click', () => showDetail(r.dataset.id)));
    }

    function showDetail(id) {
      const i = allIssues.find(x => x.id === id); if (!i) return;
      const d = i.createdAt ? new Date(i.createdAt).toLocaleString() : 'Unknown';
      const st = i.status||'open';
      document.getElementById('detail-title').textContent = i.summary||'No summary';
      document.getElementById('detail-body').innerHTML = `
        <div class="d-tags">
          <span class="priority ${i.priority}">${i.priority}</span>
          <span class="category">${(i.category||'other').replace(/_/g,' ')}</span>
          <span class="status" style="font-size:12px;"><span class="status-dot ${st}"></span>${st}</span>
        </div>
        <div class="d-field"><div class="d-label">Issue ID</div><div class="d-value mono">${i.id}</div></div>
        <div class="d-field"><div class="d-label">Reporter</div><div class="d-value" style="color:var(--gold-soft)">${esc(i.reporterName||'unknown')}</div></div>
        <div class="d-field"><div class="d-label">Reported</div><div class="d-value">${d}</div></div>
        <div class="d-field"><div class="d-label">Full Report</div><div class="d-value">${esc(i.text||'(no text)')}</div></div>
        <div class="d-field"><div class="d-label">AI Reasoning</div><div class="d-value mono">${esc(i.reasoning||'No reasoning')}</div></div>
        ${i.attachments?.length?`<div class="d-field"><div class="d-label">Attachments (${i.attachments.length})</div><div class="d-value">${i.attachments.map(a=>a.isImage?`<a href="${esc(a.url)}" target="_blank" style="display:block;margin:8px 0;"><img src="${esc(a.url)}" alt="${esc(a.name)}" style="max-width:100%;border-radius:8px;border:1px solid var(--glass-border);"></a>`:`<a href="${esc(a.url)}" target="_blank" style="color:var(--gold-soft);">📎 ${esc(a.name)} (${Math.round((a.size||0)/1024)}KB)</a>`).join('')}</div></div>`:''}
        ${i.threadContext?.length?`<div class="d-field"><div class="d-label">Thread Context (${i.threadContext.length})</div><div class="d-value mono">${i.threadContext.map(c=>esc(typeof c==='string'?c:c.text||'')).join('\n\n')}</div></div>`:''}`;
      document.getElementById('detail-panel').classList.add('active');
      document.getElementById('detail-backdrop').classList.add('active');
    }

    function closeDetail() { document.getElementById('detail-panel').classList.remove('active'); document.getElementById('detail-backdrop').classList.remove('active'); }
    document.getElementById('detail-close').addEventListener('click', closeDetail);
    document.getElementById('detail-backdrop').addEventListener('click', closeDetail);
    document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });

    function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    document.getElementById('refresh-btn').addEventListener('click', loadData);
    loadData();
    setInterval(loadData, 30000);

    // Admin
    document.addEventListener('keydown', e => {
      if (e.ctrlKey&&e.shiftKey&&e.key==='A') { e.preventDefault(); const p=document.getElementById('admin-panel'); const o=p.classList.contains('active'); if(o){p.classList.remove('active');}else{p.classList.add('active');renderAdmin();} }
    });
    document.getElementById('close-admin').addEventListener('click',()=>document.getElementById('admin-panel').classList.remove('active'));

    function renderAdmin() {
      const c=document.getElementById('admin-issues');
      if(!allIssues.length){c.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">No issues</div>';return;}
      c.innerHTML=allIssues.map(i=>`<label><input type="checkbox" class="admin-check" value="${i.id}"><span class="priority ${i.priority||'unclassified'}" style="font-size:9px;">${i.priority||'?'}</span><span style="color:var(--text);flex:1;font-size:12px;">${esc(i.summary||'')}</span><span style="color:var(--text-muted);font-size:10px;">${esc(i.reporterName||'')}</span></label>`).join('');
    }

    document.getElementById('btn-select-all').addEventListener('click',()=>document.querySelectorAll('.admin-check').forEach(c=>c.checked=true));
    document.getElementById('btn-select-none').addEventListener('click',()=>document.querySelectorAll('.admin-check').forEach(c=>c.checked=false));

    document.getElementById('btn-delete-selected').addEventListener('click',async()=>{
      const k=document.getElementById('admin-key').value; if(!k)return alert('Key required');
      const ids=[...document.querySelectorAll('.admin-check:checked')].map(c=>c.value);
      if(!ids.length)return alert('Select issues'); if(!confirm(`Delete ${ids.length}?`))return;
      await adminDel({ids},k);
    });

    document.getElementById('btn-delete-all').addEventListener('click',async()=>{
      const k=document.getElementById('admin-key').value; if(!k)return alert('Key required');
      if(!confirm('DELETE ALL?'))return; if(!confirm('Really?'))return;
      await adminDel({deleteAll:true},k);
    });

    async function adminDel(body,key) {
      const s=document.getElementById('admin-status'); s.style.display='block'; s.style.color='var(--medium)'; s.textContent='Deleting...';
      try { const r=await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':key},body:JSON.stringify(body)});
        const d=await r.json(); if(r.ok){s.style.color='var(--low)';s.textContent=d.message;loadData();setTimeout(renderAdmin,1500);}
        else{s.style.color='var(--critical)';s.textContent=`Error: ${d.error}`;}
      }catch(e){s.style.color='var(--critical)';s.textContent=`Error: ${e.message}`;}
    }
  </script>
</body>
</html>
