name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 22 LTS + 24. The npm test script uses the test-runner glob
        # (`node --test 'test/**/*.test.js'`, needs Node >= 21) and a ported test
        # uses mock.timers (needs Node >= 20.4), so older majors are not supported.
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
