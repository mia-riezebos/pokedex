<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokedex — Issue Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #e8b829;
      --gold-dim: #a07d18;
      --gold-glow: rgba(232,184,41,0.15);
      --gold-glow-strong: rgba(232,184,41,0.3);
      --bg-deep: #08090c;
      --bg-card: #0f1117;
      --bg-elevated: #151820;
      --bg-hover: #1a1e28;
      --border: #1e2230;
      --border-light: #282d3e;
      --text-primary: #e8ecf4;
      --text-secondary: #6b7394;
      --text-muted: #3e4560;
      --critical: #ef4444;
      --critical-bg: rgba(239,68,68,0.08);
      --high: #f97316;
      --high-bg: rgba(249,115,22,0.08);
      --medium: #eab308;
      --medium-bg: rgba(234,179,8,0.08);
      --low: #22c55e;
      --low-bg: rgba(34,197,94,0.08);
      --blue: #3b82f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle scan-line overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 10000;
    }

    /* === HEADER === */
    .header {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(232,184,41,0.03) 0%, transparent 100%);
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 32px; right: 32px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--gold-glow);
    }

    .logo h1 {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .logo h1 .brand { color: var(--gold); }
    .logo h1 .sub { color: var(--text-secondary); font-weight: 400; font-size: 14px; margin-left: 8px; letter-spacing: 2px; text-transform: uppercase; }

    .header-actions { display: flex; align-items: center; gap: 12px; }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--low);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
      box-shadow: 0 0 8px rgba(34,197,94,0.4);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .live-label { font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }

    .btn-refresh {
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .btn-refresh:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
      box-shadow: 0 0 12px var(--gold-glow);
    }

    /* === STATS === */
    .stats {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      margin: 24px 32px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .stat {
      background: var(--bg-card);
      padding: 20px;
      text-align: center;
      transition: background 0.2s;
      position: relative;
    }

    .stat:hover { background: var(--bg-elevated); }

    .stat .label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .stat .value {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat.critical .value { color: var(--critical); }
    .stat.high .value { color: var(--high); }
    .stat.medium .value { color: var(--medium); }
    .stat.low .value { color: var(--low); }

    .stat.critical { background: var(--critical-bg); }
    .stat.high { background: var(--high-bg); }
    .stat.medium { background: var(--medium-bg); }
    .stat.low { background: var(--low-bg); }

    /* === CONTROLS === */
    .controls {
      padding: 0 32px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls select, .controls input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      transition: border-color 0.2s;
      outline: none;
    }

    .controls select:focus, .controls input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 2px var(--gold-glow);
    }

    .controls input { flex: 1; min-width: 220px; }

    .controls select { cursor: pointer; }
    .controls select option { background: var(--bg-card); }

    .filter-count {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-left: auto;
    }

    /* === ISSUES LIST === */
    .issues { padding: 0 32px 32px; }

    .issue-list { display: flex; flex-direction: column; gap: 2px; }

    .issue-row {
      display: grid;
      grid-template-columns: 90px 90px 1fr 120px 120px 80px;
      align-items: center;
      padding: 14px 16px;
      background: var(--bg-card);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      gap: 12px;
    }

    .issue-row:hover {
      background: var(--bg-hover);
      border-color: var(--border-light);
      transform: translateX(2px);
    }

    .issue-row:first-child { border-radius: 12px 12px 8px 8px; }
    .issue-row:last-child { border-radius: 8px 8px 12px 12px; }

    .issue-header-row {
      display: grid;
      grid-template-columns: 90px 90px 1fr 120px 120px 80px;
      padding: 8px 16px 12px;
      gap: 12px;
    }

    .issue-header-row span {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Status */
    .status-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: capitalize;
    }

    .status-indicator {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-indicator.open { background: var(--low); box-shadow: 0 0 6px rgba(34,197,94,0.3); }
    .status-indicator.closed, .status-indicator.fixed { background: var(--text-muted); }
    .status-indicator.acknowledged { background: var(--blue); box-shadow: 0 0 6px rgba(59,130,246,0.3); }
    .status-indicator.escalated { background: var(--critical); box-shadow: 0 0 6px rgba(239,68,68,0.3); }
    .status-indicator.wontfix { background: var(--text-muted); }

    /* Priority */
    .priority-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Chakra Petch', sans-serif;
    }

    .priority-badge.critical { background: var(--critical-bg); color: var(--critical); border: 1px solid rgba(239,68,68,0.2); }
    .priority-badge.high { background: var(--high-bg); color: var(--high); border: 1px solid rgba(249,115,22,0.2); }
    .priority-badge.medium { background: var(--medium-bg); color: var(--medium); border: 1px solid rgba(234,179,8,0.2); }
    .priority-badge.low { background: var(--low-bg); color: var(--low); border: 1px solid rgba(34,197,94,0.2); }
    .priority-badge.unclassified { background: rgba(62,69,96,0.2); color: var(--text-muted); border: 1px solid rgba(62,69,96,0.3); }

    /* Issue content */
    .issue-content .summary {
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
      line-height: 1.4;
    }

    .issue-content .meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.3;
    }

    /* Category */
    .category-tag {
      font-size: 10px;
      color: var(--text-secondary);
      background: var(--bg-elevated);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      text-transform: capitalize;
    }

    /* Reporter */
    .reporter { font-size: 12px; color: var(--gold-dim); }

    /* Date */
    .date { font-size: 11px; color: var(--text-muted); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      display: none;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state p { color: var(--text-muted); font-size: 13px; }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .loading-state::after {
      content: '';
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold-dim);
      margin-left: 8px;
      animation: blink 1s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* === DETAIL PANEL === */
    .detail-overlay {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 480px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      z-index: 1000;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -20px 0 60px rgba(0,0,0,0.4);
    }

    .detail-overlay.active {
      display: block;
      transform: translateX(0);
    }

    .detail-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 1;
    }

    .detail-header h3 {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;
      padding-right: 12px;
    }

    .detail-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 32px; height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .detail-close:hover { border-color: var(--critical); color: var(--critical); }

    .detail-body { padding: 24px; }

    .detail-field { margin-bottom: 18px; }

    .detail-field .label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .detail-field .value {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
    }

    .detail-field .value.mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: var(--bg-deep);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .detail-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Backdrop */
    .detail-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }

    .detail-backdrop.active { display: block; }

    /* === ADMIN PANEL === */
    .admin-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(8,9,12,0.92);
      z-index: 9999;
      overflow-y: auto;
      backdrop-filter: blur(8px);
    }

    .admin-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding: 60px 20px; }

    .admin-card {
      width: 100%;
      max-width: 640px;
      background: var(--bg-card);
      border: 1px solid var(--critical);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 0 40px rgba(239,68,68,0.1);
    }

    .admin-card h2 {
      font-family: 'Chakra Petch', sans-serif;
      color: var(--critical);
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-card h2 .close-admin {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .admin-card h2 .close-admin:hover { color: var(--text-primary); }

    .admin-input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 14px;
      border-radius: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .admin-input:focus { border-color: var(--critical); }

    .admin-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .admin-btn {
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-secondary);
    }

    .admin-btn:hover { border-color: var(--text-secondary); }
    .admin-btn.danger { background: rgba(239,68,68,0.1); border-color: var(--critical); color: var(--critical); }
    .admin-btn.danger:hover { background: rgba(239,68,68,0.2); }
    .admin-btn.nuke { background: rgba(239,68,68,0.05); border-color: rgba(239,68,68,0.3); color: rgba(239,68,68,0.6); }
    .admin-btn.nuke:hover { background: rgba(239,68,68,0.15); color: var(--critical); }

    .admin-status {
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--bg-deep);
    }

    .admin-list {
      max-height: 360px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .admin-list label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      font-size: 12px;
    }

    .admin-list label:last-child { border-bottom: none; }
    .admin-list label:hover { background: var(--bg-elevated); }

    .admin-list input[type="checkbox"] { accent-color: var(--critical); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in { animation: fadeUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) both; }

    .issue-row { animation: fadeUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) both; }

    /* Responsive */
    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(4, 1fr); }
      .issue-row { grid-template-columns: 70px 70px 1fr 80px; }
      .issue-header-row { grid-template-columns: 70px 70px 1fr 80px; }
      .issue-row > :nth-child(5),
      .issue-row > :nth-child(6),
      .issue-header-row > :nth-child(5),
      .issue-header-row > :nth-child(6) { display: none; }
      .detail-overlay { width: 100%; }
    }

    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .header { padding: 16px; }
      .stats, .controls, .issues { margin-left: 16px; margin-right: 16px; padding-left: 0; padding-right: 0; }
      .logo h1 .sub { display: none; }
    }
  </style>
</head>
<body>

  <div class="header animate-in">
    <div class="logo">
      <div class="logo-icon">P</div>
      <h1><span class="brand">POKEDEX</span><span class="sub">Issue Tracker</span></h1>
    </div>
    <div class="header-actions">
      <div class="live-dot"></div>
      <span class="live-label">Live</span>
      <button class="btn-refresh" id="refresh-btn">Refresh</button>
    </div>
  </div>

  <div class="stats animate-in" style="animation-delay:0.1s" id="stats">
    <div class="stat"><div class="label">Total</div><div class="value" id="stat-total">-</div></div>
    <div class="stat"><div class="label">Open</div><div class="value" id="stat-open">-</div></div>
    <div class="stat"><div class="label">Closed</div><div class="value" id="stat-closed">-</div></div>
    <div class="stat critical"><div class="label">Critical</div><div class="value" id="stat-critical">-</div></div>
    <div class="stat high"><div class="label">High</div><div class="value" id="stat-high">-</div></div>
    <div class="stat medium"><div class="label">Medium</div><div class="value" id="stat-medium">-</div></div>
    <div class="stat low"><div class="label">Low</div><div class="value" id="stat-low">-</div></div>
  </div>

  <div class="controls animate-in" style="animation-delay:0.2s">
    <select id="filter-status">
      <option value="">All Status</option>
      <option value="open" selected>Open</option>
      <option value="closed">Closed</option>
      <option value="fixed">Fixed</option>
      <option value="acknowledged">Acknowledged</option>
      <option value="escalated">Escalated</option>
    </select>
    <select id="filter-priority">
      <option value="">All Priority</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select id="filter-category">
      <option value="">All Categories</option>
      <option value="bug">Bug</option>
      <option value="feature_request">Feature Request</option>
      <option value="ux_issue">UX Issue</option>
      <option value="performance">Performance</option>
      <option value="security">Security</option>
      <option value="infrastructure">Infrastructure</option>
      <option value="other">Other</option>
    </select>
    <input type="text" id="search" placeholder="Search issues...">
    <span class="filter-count" id="filter-count"></span>
  </div>

  <div class="issues">
    <div class="loading-state" id="loading">Loading</div>

    <div id="issue-list-wrap" style="display:none;">
      <div class="issue-header-row">
        <span>Status</span><span>Priority</span><span>Issue</span><span>Category</span><span>Reporter</span><span>Date</span>
      </div>
      <div class="issue-list" id="issue-list"></div>
    </div>

    <div class="empty-state" id="empty">
      <div class="empty-icon">&#x1F50D;</div>
      <p>No issues found matching your filters.</p>
    </div>
  </div>

  <!-- Detail slide-out panel -->
  <div class="detail-backdrop" id="detail-backdrop"></div>
  <div class="detail-overlay" id="detail-panel">
    <div class="detail-header">
      <h3 id="detail-title"></h3>
      <button class="detail-close" id="detail-close">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-overlay" id="admin-panel">
    <div class="admin-card">
      <h2>Admin Panel <button class="close-admin" id="close-admin">&times;</button></h2>
      <input type="password" class="admin-input" id="admin-key" placeholder="Enter admin secret key...">
      <div class="admin-actions">
        <button class="admin-btn danger" id="btn-delete-selected">Delete Selected</button>
        <button class="admin-btn" id="btn-select-all">Select All</button>
        <button class="admin-btn" id="btn-select-none">Select None</button>
        <button class="admin-btn nuke" id="btn-delete-all">DELETE ALL</button>
      </div>
      <div class="admin-status" id="admin-status"></div>
      <div class="admin-list" id="admin-issues"></div>
    </div>
  </div>

  <script>
    let allIssues = [];

    // --- Data ---
    async function loadData() {
      try {
        const [issuesRes, statsRes] = await Promise.all([
          fetch('/api/issues'),
          fetch('/api/stats'),
        ]);

        const issuesData = await issuesRes.json();
        const statsData = await statsRes.json();

        allIssues = issuesData.issues || [];

        document.getElementById('stat-total').textContent = statsData.total || 0;
        document.getElementById('stat-open').textContent = statsData.open || 0;
        document.getElementById('stat-closed').textContent = statsData.closed || 0;
        document.getElementById('stat-critical').textContent = statsData.byPriority?.critical || 0;
        document.getElementById('stat-high').textContent = statsData.byPriority?.high || 0;
        document.getElementById('stat-medium').textContent = statsData.byPriority?.medium || 0;
        document.getElementById('stat-low').textContent = statsData.byPriority?.low || 0;

        filterIssues();
        document.getElementById('loading').style.display = 'none';
      } catch (err) {
        document.getElementById('loading').textContent = 'Failed to connect';
      }
    }

    // --- Filters ---
    function filterIssues() {
      const status = document.getElementById('filter-status').value;
      const priority = document.getElementById('filter-priority').value;
      const category = document.getElementById('filter-category').value;
      const search = document.getElementById('search').value.toLowerCase();

      let filtered = allIssues;
      if (status) filtered = filtered.filter(i => i.status === status);
      if (priority) filtered = filtered.filter(i => i.priority === priority);
      if (category) filtered = filtered.filter(i => i.category === category);
      if (search) filtered = filtered.filter(i =>
        (i.summary || '').toLowerCase().includes(search) ||
        (i.text || '').toLowerCase().includes(search) ||
        (i.reporterName || '').toLowerCase().includes(search) ||
        (i.id || '').toLowerCase().includes(search)
      );

      document.getElementById('filter-count').textContent = `${filtered.length} issue${filtered.length !== 1 ? 's' : ''}`;
      renderIssues(filtered);
    }

    ['filter-status','filter-priority','filter-category'].forEach(id => {
      document.getElementById(id).addEventListener('change', filterIssues);
    });
    document.getElementById('search').addEventListener('input', filterIssues);

    // --- Render ---
    function renderIssues(issues) {
      const wrap = document.getElementById('issue-list-wrap');
      const list = document.getElementById('issue-list');
      const empty = document.getElementById('empty');

      if (issues.length === 0) {
        wrap.style.display = 'none';
        empty.style.display = 'block';
        return;
      }

      wrap.style.display = 'block';
      empty.style.display = 'none';

      list.innerHTML = issues.map((issue, i) => {
        const date = issue.createdAt ? new Date(issue.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '-';
        const status = issue.status || 'open';
        const priority = issue.priority || 'unclassified';

        return `<div class="issue-row" style="animation-delay:${Math.min(i * 0.03, 0.5)}s" data-id="${issue.id}">
          <div class="status-cell"><span class="status-indicator ${status}"></span>${status}</div>
          <div><span class="priority-badge ${priority}">${priority}</span></div>
          <div class="issue-content">
            <div class="summary">${escapeHtml(issue.summary || 'No summary')}</div>
            <div class="meta">${escapeHtml((issue.text || '').slice(0, 90))}${(issue.text || '').length > 90 ? '...' : ''}</div>
          </div>
          <div><span class="category-tag">${(issue.category || 'other').replace(/_/g, ' ')}</span></div>
          <div class="reporter">${escapeHtml(issue.reporterName || 'unknown')}</div>
          <div class="date">${date}</div>
        </div>`;
      }).join('');

      // Attach click handlers
      list.querySelectorAll('.issue-row').forEach(row => {
        row.addEventListener('click', () => showDetail(row.dataset.id));
      });
    }

    // --- Detail Panel ---
    function showDetail(issueId) {
      const issue = allIssues.find(i => i.id === issueId);
      if (!issue) return;

      const date = issue.createdAt ? new Date(issue.createdAt).toLocaleString() : 'Unknown';
      const status = issue.status || 'open';

      document.getElementById('detail-title').textContent = issue.summary || 'No summary';

      document.getElementById('detail-body').innerHTML = `
        <div class="detail-tags">
          <span class="priority-badge ${issue.priority}">${issue.priority}</span>
          <span class="category-tag">${(issue.category || 'other').replace(/_/g, ' ')}</span>
          <span class="status-cell" style="font-size:12px;"><span class="status-indicator ${status}"></span>${status}</span>
        </div>
        <div class="detail-field" style="margin-top:20px;">
          <div class="label">Issue ID</div>
          <div class="value mono">${issue.id}</div>
        </div>
        <div class="detail-field">
          <div class="label">Reporter</div>
          <div class="value" style="color:var(--gold-dim);">${escapeHtml(issue.reporterName || 'unknown')}</div>
        </div>
        <div class="detail-field">
          <div class="label">Reported</div>
          <div class="value">${date}</div>
        </div>
        <div class="detail-field">
          <div class="label">Full Report</div>
          <div class="value">${escapeHtml(issue.text || '(no text)')}</div>
        </div>
        <div class="detail-field">
          <div class="label">AI Reasoning</div>
          <div class="value mono">${escapeHtml(issue.reasoning || 'No reasoning')}</div>
        </div>
        ${issue.threadContext?.length ? `<div class="detail-field">
          <div class="label">Thread Context (${issue.threadContext.length} updates)</div>
          <div class="value mono">${issue.threadContext.map(c => escapeHtml(typeof c === 'string' ? c : c.text || '')).join('\n\n')}</div>
        </div>` : ''}
      `;

      document.getElementById('detail-panel').classList.add('active');
      document.getElementById('detail-backdrop').classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detail-panel').classList.remove('active');
      document.getElementById('detail-backdrop').classList.remove('active');
    }

    document.getElementById('detail-close').addEventListener('click', closeDetail);
    document.getElementById('detail-backdrop').addEventListener('click', closeDetail);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

    // --- Utils ---
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Init ---
    document.getElementById('refresh-btn').addEventListener('click', loadData);
    loadData();
    setInterval(loadData, 30000);

    // === ADMIN PANEL ===
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'A') {
        e.preventDefault();
        const panel = document.getElementById('admin-panel');
        const isOpen = panel.classList.contains('active');
        if (isOpen) {
          panel.classList.remove('active');
        } else {
          panel.classList.add('active');
          renderAdminIssues();
        }
      }
    });

    document.getElementById('close-admin').addEventListener('click', () => {
      document.getElementById('admin-panel').classList.remove('active');
    });

    function renderAdminIssues() {
      const container = document.getElementById('admin-issues');
      if (allIssues.length === 0) {
        container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">No issues loaded.</div>';
        return;
      }
      container.innerHTML = allIssues.map(issue => {
        const priority = issue.priority || 'unknown';
        return `<label>
          <input type="checkbox" class="admin-check" value="${issue.id}">
          <span class="priority-badge ${priority}" style="font-size:9px;">${priority}</span>
          <span style="color:var(--text-primary);flex:1;font-size:12px;">${escapeHtml(issue.summary || 'No summary')}</span>
          <span style="color:var(--text-muted);font-size:10px;">${escapeHtml(issue.reporterName || '')}</span>
        </label>`;
      }).join('');
    }

    document.getElementById('btn-select-all').addEventListener('click', () => {
      document.querySelectorAll('.admin-check').forEach(cb => cb.checked = true);
    });

    document.getElementById('btn-select-none').addEventListener('click', () => {
      document.querySelectorAll('.admin-check').forEach(cb => cb.checked = false);
    });

    document.getElementById('btn-delete-selected').addEventListener('click', async () => {
      const key = document.getElementById('admin-key').value;
      if (!key) return alert('Enter admin key first');
      const ids = [...document.querySelectorAll('.admin-check:checked')].map(cb => cb.value);
      if (ids.length === 0) return alert('Select issues to delete');
      if (!confirm(`Delete ${ids.length} issue(s)?`)) return;
      await adminDelete({ ids }, key);
    });

    document.getElementById('btn-delete-all').addEventListener('click', async () => {
      const key = document.getElementById('admin-key').value;
      if (!key) return alert('Enter admin key first');
      if (!confirm('DELETE ALL ISSUES? This cannot be undone.')) return;
      if (!confirm('Are you really sure? This deletes EVERYTHING.')) return;
      await adminDelete({ deleteAll: true }, key);
    });

    async function adminDelete(body, key) {
      const status = document.getElementById('admin-status');
      status.style.display = 'block';
      status.style.color = 'var(--medium)';
      status.textContent = 'Deleting...';
      try {
        const res = await fetch('/api/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (res.ok) {
          status.style.color = 'var(--low)';
          status.textContent = data.message;
          loadData();
          setTimeout(() => renderAdminIssues(), 1500);
        } else {
          status.style.color = 'var(--critical)';
          status.textContent = `Error: ${data.error}`;
        }
      } catch (err) {
        status.style.color = 'var(--critical)';
        status.textContent = `Error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
